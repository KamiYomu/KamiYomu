name: Pull Request Validation

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/KamiYomu.sln

      - name: Build
        run: dotnet build ./src/KamiYomu.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ./src/KamiYomu.sln --no-build --configuration Release --verbosity normal